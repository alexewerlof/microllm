<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="index.css" />
        <title>MicroLLM - Chat</title>
    </head>
    <body>
        <fieldset id="init-controls">
            <legend>Settings</legend>
            <div>
                <label for="model">Model:</label><br />
                <select id="model">
                    <option value="onnx-community/LFM2-1.2B-ONNX">Liquid 2 1.2B</option>
                    <option value="LiquidAI/LFM2.5-1.2B-Thinking-ONNX">Liquid 2.5 1.2B Thinking</option>
                    <option value="onnx-community/LFM2-1.2B-RAG-ONNX">Liquid 2 1.2B RAG</option>
                    <option value="onnx-community/LFM2-1.2B-Tool-ONNX">Liquid 2 1.2B Tool Calling</option>
                    <option value="onnx-community/gemma-4-E4B-it-ONNX">Gemma 4 E4B Instruction Tuned</option>
                    <option value="onnx-community/gemma-3-1b-it-ONNX" disabled>Gemma 3 1B Instruction Tuned</option>
                </select>
            </div>
            <div>
                <label for="device">Device:</label><br />
                <select id="device">
                    <option value="auto">Auto</option>
                    <option value="webgpu">WebGPU (GPU via WebGPU API)</option>
                    <option value="wasm">WASM (CPU fallback for browsers)</option>
                </select>
            </div>
            <div>
                <label for="system-prompt">System Prompt:</label><br />
                <textarea id="system-prompt" rows="4" cols="50" placeholder="You are a helpful assistant.">You are a helpful assistant.</textarea>
            </div>
            <progress id="loading-progress" value="0" max="100"></progress>
            <button id="initialize-model">
                Initialize
            </button>
        </fieldset>
        <div id="chatUI" hidden>
            <fieldset>
                <legend>Chat Options</legend>
                <label for="max-new-tokens">Max New Tokens:</label><br />
                <select id="max-new-tokens">
                    <option value="512">512</option>
                    <option value="1024">1k</option>
                    <option value="2048">2k</option>
                    <option value="4096" selected>4k</option>
                    <option value="8192">8k</option>
                    <option value="16384">16k</option>
                    <option value="32768">32k</option>
                    <option value="65536">64k</option>
                </select>
            </fieldset>
            <div id="chat-thread"></div>
            <textarea id="prompt" rows="4" cols="50" placeholder="Type something and press enter..."></textarea><br />
            <button id="sendPrompt">Send</button>
        </div>
        <script type="importmap">
            {
                "imports": {
                    "micro-llm": "../../../lib/bundle.browser.js",
                    "jj": "../../../node_modules/jj/lib/bundle.js"
                }
            }
        </script>
        <script type="module" src="index.js"></script>
    </body>
</html>
